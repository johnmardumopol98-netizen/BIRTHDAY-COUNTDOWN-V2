<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Countdown</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #0f172a;
    color: white;
    margin-top: 50px;
    overflow: hidden;
}

input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

button {
    background: #22c55e;
    color: white;
    cursor: pointer;
}

#countdown {
    font-size: 30px;
    margin-top: 20px;
}

#celebration {
    display: none;
    font-size: 40px;
    margin-top: 40px;
    animation: pop 1s infinite alternate;
}

@keyframes pop {
    from { transform: scale(1); }
    to { transform: scale(1.2); }
}

/* 🎈 Balloons */
.balloon {
    position: absolute;
    bottom: -100px;
    width: 40px;
    height: 60px;
    background: red;
    border-radius: 50%;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(0); }
    to { transform: translateY(-110vh); }
}
</style>

</head>
<body>

<h1>🎂 Birthday Countdown 🎂</h1>

<input type="date" id="birthdayInput">
<button onclick="saveBirthday()">Save Birthday</button>

<div id="countdown"></div>

<div id="celebration">
🎉 HAPPY BIRTHDAY! 🎉
</div>

<script>
function saveBirthday() {
    const date = document.getElementById("birthdayInput").value;
    if (date) {
        localStorage.setItem("birthday", date);
    }
}

function createBalloons() {
    for (let i = 0; i < 20; i++) {
        const balloon = document.createElement("div");
        balloon.className = "balloon";
        balloon.style.left = Math.random() * 100 + "vw";
        balloon.style.background = `hsl(${Math.random()*360}, 70%, 50%)`;
        balloon.style.animationDuration = (3 + Math.random()*3) + "s";
        document.body.appendChild(balloon);
    }
}

function updateCountdown() {
    const now = new Date();
    const saved = localStorage.getItem("birthday");

    if (!saved) return;

    let birthday = new Date(saved);
    birthday.setFullYear(now.getFullYear());

    if (birthday < now) {
        birthday.setFullYear(now.getFullYear() + 1);
    }

    const diff = birthday - now;

    if (diff <= 0) {
        document.getElementById("countdown").style.display = "none";
        document.getElementById("celebration").style.display = "block";
        createBalloons();
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("countdown").innerHTML =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
  </html>
